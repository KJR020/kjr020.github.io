name: Auto Fill Date in Markdown Files

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update 'updated' date in pushed markdown files
        run: |
          DATE=`date +%Y-%m-%d %H:%M:%S`
          FILES=$(git diff --name-only HEAD^ HEAD | grep '\.md$')
          if [ -z "$FILES" ]; then
            echo "No markdown files to update."
          else
            echo "$FILES" | xargs -I {} sed -i "s/updated: .*/updated: $DATE/" {}
          fi

      - name: Commit and push if necessary
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add .
            git commit -m "Automatically update 'updated' date in markdown files"
            git push
          fi
