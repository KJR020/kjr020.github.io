name: Auto Fill Date in Markdown Files

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update date in markdown files
        run: |
          DATE=`date +%Y-%m-%d\ %H:%M:%S`
          find . -name '*.md' -exec sed -i "s/updated:.*/updated: $DATE/" {} \;

      - name: Commit and push if necessary
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add README.md
          git commit -m "Update README with links to LearningNotes"
          git push